name: Microservices GHCR CICD
# trigger test
on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'release/'

  workflow_dispatch:
    inputs:
      force_full_build:
        description: "Force build of all services"
        required: false
        default: "false"      

permissions:
  contents: write
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  USERNAME: nillz24

concurrency:
  group: microservices-main
  cancel-in-progress: false  

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest detect \
            --source=/repo \
            --report-format json \
            --report-path /repo/gitleaks-report.json \
            --exit-code 0

  checkov:
    runs-on: ubuntu-latest
    needs: gitleaks
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        run: |
          docker run --rm -v "$PWD:/tf" bridgecrew/checkov \
            -d /tf --soft-fail

  detect-changes:
    runs-on: ubuntu-latest
    needs: checkov
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 20

      - name: Detect first run
        id: first-run
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            echo "first_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "first_run=true" >> "$GITHUB_OUTPUT"
          fi

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            adservice:
              - 'src/adservice/**'
              - 'protos/**'
            cartservice:
              - 'src/cartservice/**'
              - 'protos/**'
            checkoutservice:
              - 'src/checkoutservice/**'
              - 'protos/**'
            currencyservice:
              - 'src/currencyservice/**'
              - 'protos/**'
            emailservice:
              - 'src/emailservice/**'
              - 'protos/**'
            frontend:
              - 'src/frontend/**'
              - 'protos/**'
            loadgenerator:
              - 'src/loadgenerator/**'
            paymentservice:
              - 'src/paymentservice/**'
              - 'protos/**'
            productcatalogservice:
              - 'src/productcatalogservice/**'
              - 'protos/**'
            recommendationservice:
              - 'src/recommendationservice/**'
              - 'protos/**'
            shippingservice:
              - 'src/shippingservice/**'
              - 'protos/**'
            shoppingassistantservice:
              - 'src/shoppingassistantservice/**'

      - name: Debug filter outputs
        run: |
          echo "first_run=${{ steps.first-run.outputs.first_run }}"
          echo "adservice=${{ steps.filter.outputs.adservice }}"
          echo "cartservice=${{ steps.filter.outputs.cartservice }}"
          echo "checkoutservice=${{ steps.filter.outputs.checkoutservice }}"
          echo "currencyservice=${{ steps.filter.outputs.currencyservice }}"
          echo "emailservice=${{ steps.filter.outputs.emailservice }}"
          echo "frontend=${{ steps.filter.outputs.frontend }}"
          echo "loadgenerator=${{ steps.filter.outputs.loadgenerator }}"
          echo "paymentservice=${{ steps.filter.outputs.paymentservice }}"
          echo "productcatalogservice=${{ steps.filter.outputs.productcatalogservice }}"
          echo "recommendationservice=${{ steps.filter.outputs.recommendationservice }}"
          echo "shippingservice=${{ steps.filter.outputs.shippingservice }}"
          echo "shoppingassistantservice=${{ steps.filter.outputs.shoppingassistantservice }}"

      - name: Build dynamic matrix
        id: set-matrix
        run: |
          SERVICES=()

          [[ "${{ steps.filter.outputs.adservice }}" == "true" ]] && SERVICES+=('"adservice"')
          [[ "${{ steps.filter.outputs.cartservice }}" == "true" ]] && SERVICES+=('"cartservice"')
          [[ "${{ steps.filter.outputs.checkoutservice }}" == "true" ]] && SERVICES+=('"checkoutservice"')
          [[ "${{ steps.filter.outputs.currencyservice }}" == "true" ]] && SERVICES+=('"currencyservice"')
          [[ "${{ steps.filter.outputs.emailservice }}" == "true" ]] && SERVICES+=('"emailservice"')
          [[ "${{ steps.filter.outputs.frontend }}" == "true" ]] && SERVICES+=('"frontend"')
          [[ "${{ steps.filter.outputs.loadgenerator }}" == "true" ]] && SERVICES+=('"loadgenerator"')
          [[ "${{ steps.filter.outputs.paymentservice }}" == "true" ]] && SERVICES+=('"paymentservice"')
          [[ "${{ steps.filter.outputs.productcatalogservice }}" == "true" ]] && SERVICES+=('"productcatalogservice"')
          [[ "${{ steps.filter.outputs.recommendationservice }}" == "true" ]] && SERVICES+=('"recommendationservice"')
          [[ "${{ steps.filter.outputs.shippingservice }}" == "true" ]] && SERVICES+=('"shippingservice"')
          [[ "${{ steps.filter.outputs.shoppingassistantservice }}" == "true" ]] && SERVICES+=('"shoppingassistantservice"')

          FORCE_FULL="${{ github.event.inputs.force_full_build }}"
          if [ "$FORCE_FULL" = "true" ]; then
            echo "Force full build triggered"
            SERVICES=(
              '"adservice"'
              '"cartservice"'
              '"checkoutservice"'
              '"currencyservice"'
              '"emailservice"'
              '"frontend"'
              '"loadgenerator"'
              '"paymentservice"'
              '"productcatalogservice"'
              '"recommendationservice"'
              '"shippingservice"'
              '"shoppingassistantservice"'
            )
            HAS_CHANGES=true          
          elif [ ${#SERVICES[@]} -eq 0 ]; then
            if [ "${{ steps.first-run.outputs.first_run }}" = "true" ]; then
              echo "First run detected. Running all services."
              SERVICES=(
                '"adservice"'
                '"cartservice"'
                '"checkoutservice"'
                '"currencyservice"'
                '"emailservice"'
                '"frontend"'
                '"loadgenerator"'
                '"paymentservice"'
                '"productcatalogservice"'
                '"recommendationservice"'
                '"shippingservice"'
                '"shoppingassistantservice"'
              )
              HAS_CHANGES=true 
            else
              echo "No service changes detected."
              SERVICES=('"__none__"')
              HAS_CHANGES=false
            fi  
          else
            HAS_CHANGES=true
          fi

          JSON="{\"service\":[$(IFS=,; echo "${SERVICES[*]}")]}"
          echo "matrix=$JSON" >> "$GITHUB_OUTPUT"
          echo "has_changes=$HAS_CHANGES" >> "$GITHUB_OUTPUT"
          echo "$JSON"

  service-pipeline:
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Skip when no service changed
        if: matrix.service == '__none__'
        run: echo "No service changes. Skipping build."

      - uses: actions/checkout@v4
        if: matrix.service != '__none__'

      - name: Login GHCR
        if: matrix.service != '__none__'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Install Trivy
        if: matrix.service != '__none__'
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: latest
          cache: true

      - name: Trivy FS Scan
        if: matrix.service != '__none__'
        run: |
          if [ "${{ matrix.service }}" = "cartservice" ]; then
            trivy fs ./src/cartservice/src --severity HIGH,CRITICAL --exit-code 0
          else
            trivy fs ./src/${{ matrix.service }} --severity HIGH,CRITICAL --exit-code 0
          fi

      - name: Build Docker image
        if: matrix.service != '__none__'
        run: |
          if [ "${{ matrix.service }}" = "cartservice" ]; then
            docker build \
              -t $REGISTRY/$USERNAME/${{ matrix.service }}:${{ github.sha }} \
              ./src/cartservice/src
          else
            docker build \
              -t $REGISTRY/$USERNAME/${{ matrix.service }}:${{ github.sha }} \
              ./src/${{ matrix.service }}
          fi

      - name: Trivy Image Scan
        if: matrix.service != '__none__'
        run: |
          trivy image ghcr.io/${{ env.USERNAME }}/${{ matrix.service }}:${{ github.sha }} \
            --severity HIGH,CRITICAL --exit-code 0

      - name: Push Image
        if: matrix.service != '__none__'
        run: |
          docker push ghcr.io/${{ env.USERNAME }}/${{ matrix.service }}:${{ github.sha }}

      - name: Cleanup Docker
        if: matrix.service != '__none__'
        run: |
          docker image prune -af

  update-manifest:
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - service-pipeline
    if: needs.detect-changes.outputs.has_changes == 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

#      - name: Update manifest images
#        run: |
#          SHA=${GITHUB_SHA}
#          MATRIX='${{ needs.detect-changes.outputs.matrix }}'
#          for svc in $(echo "$MATRIX" | jq -r '.service[]'); do
#            if [ "$svc" = "__none__" ]; then
#              continue
#            fi
#            sed -i "s|ghcr.io/${{ env.USERNAME }}/$svc:.*|ghcr.io/${{ env.USERNAME }}/$svc:${SHA}|g" release/kubernetes-manifests.yaml
#          done

      - name: Install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      - name: Update manifest images
        run: |
          set -euo pipefail

          SHA=${GITHUB_SHA}
          MATRIX='${{ needs.detect-changes.outputs.matrix }}'
          FILE="release/kubernetes-manifests.yaml"
          echo "Using SHA: $SHA"

          for svc in $(echo "$MATRIX" | jq -r '.service[]'); do
            echo "Processing service: $svc"
            yq -i '
              (
                select(
                  (.kind == "Deployment" or .kind == "StatefulSet" or .kind == "DaemonSet")
                  and (.metadata.name == "'"$svc"'")
                  and (.spec.template.spec.containers != null)
                )
                | .spec.template.spec.containers[].image
              ) = "ghcr.io/nillz24/'"$svc"':'"$SHA"'"
            ' "$FILE"

          done

          echo "---- Updated images ----"
          grep "image:" "$FILE" || true

      - name: Commit once
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add release/kubernetes-manifests.yaml

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update images to SHA ${GITHUB_SHA}"

          # Retry push up to 3 times
          for i in 1 2 3; do
            git push && break
            echo "Push failed, retrying ($i)..."
            git pull --rebase origin main
          done

  deploy-to-k8s:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: update-manifest
    if: |
      github.event_name == 'workflow_dispatch' || 
      github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: ap-south-1
      EKS_CLUSTER_NAME: my-cluster
      K8S_NAMESPACE: project

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure AWS credentials from GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Generate kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --region "${AWS_REGION}" --name "${EKS_CLUSTER_NAME}"

      - name: Verify namespace access
        run: |
          aws sts get-caller-identity
          kubectl config current-context
          kubectl get pods -n "${K8S_NAMESPACE}"
          kubectl get services -n "${K8S_NAMESPACE}"
          kubectl auth can-i get pods -n "${K8S_NAMESPACE}"
          kubectl auth can-i create deployments -n "${K8S_NAMESPACE}"
          kubectl auth can-i update deployments -n "${K8S_NAMESPACE}"
          kubectl auth can-i create services -n "${K8S_NAMESPACE}"

      - name: Deploy manifest
        run: |
          kubectl apply -f release/ -n "${K8S_NAMESPACE}"

      - name: Verify rollout for all deployments
        run: |
          deployments=(
            adservice
            cartservice
            checkoutservice
            currencyservice
            emailservice
            frontend
            loadgenerator
            paymentservice
            productcatalogservice
            recommendationservice
            shippingservice
          )

          for deploy in "${deployments[@]}"; do
            echo "Checking rollout for $deploy..."
            kubectl rollout status deployment/"$deploy" -n "${K8S_NAMESPACE}" --timeout=400s
          done

      - name: Run Smoke Tests
        run: |
          kubectl run smoke-test -n project --rm -i --restart=Never \
            --image=curlimages/curl \
            -- sh -c "
              set -e

              echo 'Testing frontend (HTTP)...'
              curl -f http://frontend:80

              echo 'Testing backend connectivity (gRPC ports)...'
              nc -zv productcatalogservice 3550
              nc -zv cartservice 7070
              nc -zv checkoutservice 5050

              echo '✅ All services healthy inside cluster'
            "
